syntax = "proto3";

package telemetry;

option go_package = "./grpc_proto;grpc_proto";
// TelemetryService defines the gRPC service for sending telemetry data
service TelemetryService {
    // SendTelemetry sends a telemetry data point
    rpc SendTelemetry (TelemetryRequest) returns (TelemetryResponse);
    rpc CollectTelemetry (TelemetryRequest) returns (stream TelemetryRequest);
    rpc AckTelemetry(AckRequest) returns (AckResponse);  // NEW
}

message TelemetryRequest {
    int64 timestamp = 1;        // Timestamp in nanoseconds, set by streamer
    string metric_name = 2;
    string gpu_id = 3;
    string device = 4;
    string uuid = 5;
    repeated string modelName = 6; // repeated for multiple modelName fields
    string namespace = 7;
    double value = 8;
    string labels_raw = 9;
    string message_id = 20;  // populated only on dispatch to collector; empty when streamer sends
}

message TelemetryResponse {
    bool success = 1;
    string message = 2;
}

// New ack RPC
message AckRequest {
  string message_id = 1;
}

message AckResponse {
  bool success = 1;
  string message = 2;
}