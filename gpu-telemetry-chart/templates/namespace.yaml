apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace | default "gpu-telemetry" }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    name: {{ .Values.namespace | default "gpu-telemetry" }}
  annotations:
    "helm.sh/resource-policy": keep-on-delete-false