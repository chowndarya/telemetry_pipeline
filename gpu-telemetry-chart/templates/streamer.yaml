apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.streamer.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.streamer.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.streamer.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.streamer.name }}
    spec:
      initContainers:
        - name: wait-for-queue
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for queue at {{ .Values.queue.name }}:{{ .Values.queue.port }}..."
              until nc -z {{ .Values.queue.name }} {{ .Values.queue.port }}; do
                echo "  ...still waiting"
                sleep 2
              done
              echo "Queue is reachable. Starting streamer."
      containers:
      - name: streamer
        image: "{{ .Values.image.registry }}/{{ .Values.streamer.image }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        envFrom:
        - configMapRef:
            name: telemetry-config