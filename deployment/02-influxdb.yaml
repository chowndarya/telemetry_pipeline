apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: gpu-telemetry
spec:
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
      - name: influxdb
        image: influxdb:latest
        ports:
        - containerPort: 8181
        env:
        - name: INFLUXD_HTTP_BIND_ADDRESS
          value: ":8181"
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: gpu-telemetry
spec:
  selector:
    app: influxdb
  ports:
  - port: 8181
    targetPort: 8181